<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEL Lexicon | ImpactMojo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0F172A;
            --secondary-bg: #1E293B;
            --accent-color: #0EA5E9;
            --success-color: #10B981;
            --text-primary: #F1F5F9;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --card-bg: #1E293B;
            --border-color: #334155;
        }
        [data-theme="light"] {
            --primary-bg: #FFFFFF;
            --secondary-bg: #F8FAFC;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --card-bg: #FFFFFF;
            --border-color: #E2E8F0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--primary-bg); color: var(--text-primary); line-height: 1.6; }
        .header { background: var(--secondary-bg); border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; position: sticky; top: 0; z-index: 100; }
        .header-content { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; color: var(--text-primary); font-weight: 600; }
        .logo img { width: 32px; height: 32px; border-radius: 6px; }
        .back-link { color: var(--accent-color); text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
        .main { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .hero { text-align: center; margin-bottom: 2rem; }
        .hero h1 { font-family: 'Poppins', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, var(--accent-color), var(--success-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { color: var(--text-secondary); font-size: 1.1rem; }
        .search-container { max-width: 600px; margin: 1.5rem auto; }
        .search-input { width: 100%; padding: 1rem 1.5rem; font-size: 1rem; border: 2px solid var(--border-color); border-radius: 12px; background: var(--secondary-bg); color: var(--text-primary); outline: none; }
        .search-input:focus { border-color: var(--accent-color); }
        .search-input::placeholder { color: var(--text-muted); }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 0.5rem; justify-content: center; margin-bottom: 2rem; }
        .category-tab { padding: 0.5rem 1rem; border: 1px solid var(--border-color); border-radius: 20px; background: transparent; color: var(--text-secondary); font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
        .category-tab:hover, .category-tab.active { background: var(--accent-color); color: white; border-color: var(--accent-color); }
        .terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
        .term-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; transition: transform 0.2s, box-shadow 0.2s; }
        .term-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.2); }
        .term-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.75rem; }
        .term-name { font-weight: 600; font-size: 1.1rem; color: var(--accent-color); }
        .term-category { font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: var(--secondary-bg); color: var(--text-muted); text-transform: uppercase; }
        .term-definition { color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 0.75rem; }
        .term-example { font-size: 0.85rem; color: var(--text-muted); padding-left: 1rem; border-left: 2px solid var(--accent-color); font-style: italic; }
        .stats { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem; }
        .theme-toggle { background: transparent; border: 1px solid var(--border-color); border-radius: 8px; padding: 0.5rem; cursor: pointer; color: var(--text-secondary); font-size: 1.1rem; }
        @media (max-width: 768px) { .terms-grid { grid-template-columns: 1fr; } .hero h1 { font-size: 1.75rem; } .header-content { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="../../index.html" class="logo"><img src="https://www.impactmojo.in/assets/images/ImpactMojo%20Logo.png" alt="ImpactMojo"><span>ImpactMojo</span></a>
            <a href="index.html" class="back-link">← Back to MEL Course</a>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>
    </header>
    <main class="main">
        <div class="hero">
            <h1>MEL Lexicon</h1>
            <p>65 essential terms for Monitoring, Evaluation & Learning practitioners</p>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" id="search" placeholder="Search terms..." oninput="filterTerms()">
        </div>
        <div class="category-tabs">
            <button class="category-tab active" data-category="all" onclick="filterByCategory('all')">All (65)</button>
            <button class="category-tab" data-category="foundations" onclick="filterByCategory('foundations')">Foundations</button>
            <button class="category-tab" data-category="design" onclick="filterByCategory('design')">Design</button>
            <button class="category-tab" data-category="data" onclick="filterByCategory('data')">Data</button>
            <button class="category-tab" data-category="analysis" onclick="filterByCategory('analysis')">Analysis</button>
            <button class="category-tab" data-category="evaluation" onclick="filterByCategory('evaluation')">Evaluation</button>
            <button class="category-tab" data-category="learning" onclick="filterByCategory('learning')">Learning</button>
        </div>
        <div class="terms-grid" id="terms-grid"></div>
        <div class="stats" id="stats">Showing 65 terms</div>
    </main>
    <script>
const terms=[{name:"Monitoring",category:"foundations",definition:"The continuous, systematic collection of data on specified indicators to track progress toward objectives and inform management decisions.",example:"Monthly tracking of school attendance rates to identify dropout patterns."},{name:"Evaluation",category:"foundations",definition:"A systematic assessment of an ongoing or completed project to determine relevance, efficiency, effectiveness, impact, and sustainability.",example:"Endline evaluation comparing learning outcomes between treatment and control schools."},{name:"Learning",category:"foundations",definition:"The process of generating insights from M&E data and applying them to improve programs.",example:"Adjusting training curriculum based on participant feedback and assessment scores."},{name:"Accountability",category:"foundations",definition:"The obligation to demonstrate that work has been conducted in compliance with agreed rules and to report fairly on performance.",example:"Annual reports to donors showing how funds were spent and results achieved."},{name:"Results-Based Management",category:"foundations",definition:"A management strategy focused on performance and achievement of outputs, outcomes, and impact, rather than just activities.",example:"Shifting from reporting 'workshops conducted' to 'farmers adopting improved practices'."},{name:"Results Chain",category:"foundations",definition:"A causal sequence showing how inputs lead to activities, outputs, outcomes, and ultimately impact.",example:"Funds → Training → Farmers trained → Practices adopted → Yield increase → Income improvement."},{name:"Inputs",category:"foundations",definition:"The financial, human, and material resources used for a development intervention.",example:"Budget of $500,000, 10 staff members, training materials, vehicles."},{name:"Activities",category:"foundations",definition:"Actions taken or work performed to convert inputs into outputs.",example:"Conducting farmer training sessions, distributing seeds, installing irrigation systems."},{name:"Outputs",category:"foundations",definition:"The direct products or services delivered by program activities.",example:"500 farmers trained, 1,000 seed kits distributed, 50 wells constructed."},{name:"Outcomes",category:"foundations",definition:"Short and medium-term effects of outputs, typically changes in behavior, knowledge, or practice.",example:"70% of trained farmers adopting at least two improved agricultural practices."},{name:"Impact",category:"foundations",definition:"Long-term, sustainable changes in conditions or well-being attributable to the intervention.",example:"25% reduction in child malnutrition in target communities over 5 years."},{name:"Theory of Change",category:"design",definition:"A comprehensive description of how and why desired change is expected to happen, articulating assumptions and causal pathways.",example:"Diagram showing how teacher training leads to better instruction, engagement, and learning."},{name:"Logical Framework",category:"design",definition:"A 4x4 matrix summarizing goal, purpose, outputs, and activities with indicators, means of verification, and assumptions.",example:"Project document table showing impact, outcomes, outputs with SMART indicators."},{name:"IF-THEN-BECAUSE",category:"design",definition:"A framework for articulating causal logic: IF we do X, THEN Y will happen, BECAUSE of mechanism Z.",example:"IF we provide microloans, THEN women will start businesses, BECAUSE they lack capital."},{name:"Assumptions",category:"design",definition:"Conditions that must hold true for the causal logic to work as expected.",example:"Assuming trained health workers will remain in their posts and not migrate."},{name:"Theory Failure",category:"design",definition:"When a program fails because the underlying causal logic was wrong, not due to implementation problems.",example:"Textbooks didn't improve learning because children couldn't read—the theory was flawed."},{name:"Implementation Failure",category:"design",definition:"When a program fails due to poor execution, despite having sound underlying logic.",example:"Teacher training was effective but only 30% attended due to poor scheduling."},{name:"SMART Indicators",category:"design",definition:"Indicators that are Specific, Measurable, Achievable, Relevant, and Time-bound.",example:"'Percentage of children under 5 who are stunted' rather than 'improved nutrition'."},{name:"CREAM Indicators",category:"design",definition:"World Bank framework: Clear, Relevant, Economic, Adequate, and Monitorable.",example:"Selecting indicators that can be collected cost-effectively with existing systems."},{name:"Indicator",category:"design",definition:"A quantitative or qualitative measure used to track progress toward objectives.",example:"Percentage of households with access to improved water sources within 30 minutes."},{name:"Baseline",category:"design",definition:"Data collected at program start to establish initial conditions against which progress is measured.",example:"Before the intervention, 45% of children were reading at grade level."},{name:"Target",category:"design",definition:"The specific, planned level of results to be achieved within a given timeframe.",example:"Increase reading proficiency from 45% to 70% by end of Year 3."},{name:"Benchmark",category:"design",definition:"A reference point or standard against which performance can be assessed.",example:"National average stunting rate of 35% used to contextualize district data."},{name:"Disaggregation",category:"design",definition:"Breaking down data by categories such as sex, age, geography, or wealth to reveal patterns.",example:"Analyzing school enrollment separately for boys and girls in each district."},{name:"Sampling",category:"data",definition:"The process of selecting a subset of a population for data collection, designed to be representative.",example:"Randomly selecting 60 villages from 500 using probability proportional to size (PPS)."},{name:"Sample Size",category:"data",definition:"The number of observations needed to detect effects with adequate statistical power.",example:"400 households per group needed to detect a 10 percentage point change."},{name:"Power Calculation",category:"data",definition:"Statistical analysis to determine sample size needed to detect an effect of given size.",example:"80% power to detect d=0.3 effect at 95% confidence requires n=176 per group."},{name:"Household Survey",category:"data",definition:"A systematic data collection method using structured questionnaires administered to households.",example:"DHS-style survey collecting health, education, and economic data from 5,000 households."},{name:"Key Informant Interview",category:"data",definition:"A qualitative method involving in-depth interviews with knowledgeable individuals.",example:"Interviewing district health officers about barriers to service delivery."},{name:"Focus Group Discussion",category:"data",definition:"A moderated group discussion (6-12 participants) exploring perspectives on a topic.",example:"Discussing farming practices with groups of male and female farmers separately."},{name:"Most Significant Change",category:"data",definition:"A participatory method for collecting and selecting stories of change.",example:"Asking 'What was the most significant change in your life from this program?'"},{name:"Administrative Data",category:"data",definition:"Data collected routinely by government or organizations for operational purposes.",example:"Health facility records, school enrollment registers, tax records."},{name:"Data Quality",category:"data",definition:"The fitness of data for intended use, assessed across validity, reliability, timeliness, and integrity.",example:"Conducting back-checks on 10% of surveys to verify enumerator accuracy."},{name:"Validity",category:"data",definition:"The degree to which data measures what it claims to measure.",example:"Does 'household income' capture economic well-being or miss home production?"},{name:"Reliability",category:"data",definition:"The consistency of measurement—whether repeated measures produce the same result.",example:"Two enumerators measuring the same child's height should get the same reading."},{name:"Back-check",category:"data",definition:"Re-interviewing a sample of respondents to verify data quality and detect errors or fraud.",example:"Supervisors revisiting 10% of households to confirm key responses."},{name:"Mean",category:"analysis",definition:"The arithmetic average, calculated by summing all values and dividing by count.",example:"Mean household income of ₹15,000 when summing all incomes and dividing by count."},{name:"Median",category:"analysis",definition:"The middle value when data is arranged in order; less sensitive to outliers than the mean.",example:"Median income of ₹12,000 better represents 'typical' household than mean of ₹63,500."},{name:"Standard Deviation",category:"analysis",definition:"A measure of the spread or dispersion of data around the mean.",example:"SD of ₹5,000 indicates most incomes fall within ₹10,000-20,000 of the mean."},{name:"Effect Size",category:"analysis",definition:"A standardized measure of the magnitude of an effect, independent of sample size.",example:"Cohen's d of 0.5 means treatment group scored 0.5 standard deviations higher."},{name:"Statistical Significance",category:"analysis",definition:"The probability that an observed result occurred by chance; typically p<0.05 is significant.",example:"p=0.03 means only 3% probability the difference occurred by chance."},{name:"Confidence Interval",category:"analysis",definition:"A range within which the true population parameter is likely to fall.",example:"95% CI of 45-55% means we're 95% confident true value lies in this range."},{name:"Percentage Point",category:"analysis",definition:"The arithmetic difference between two percentages.",example:"From 40% to 60% is a 20 percentage point increase (not 50% increase)."},{name:"Difference-in-Differences",category:"analysis",definition:"Comparing changes over time between treatment and comparison groups.",example:"(Treatment endline - baseline) minus (Control endline - baseline)."},{name:"Accuracy",category:"analysis",definition:"How close measurements are to the true value; absence of systematic bias.",example:"Survey estimates 35% poverty vs. true rate of 36%—accurate but imprecise."},{name:"Precision",category:"analysis",definition:"The consistency of measurements; narrow confidence intervals indicate high precision.",example:"Estimate of 35% ± 2% is more precise than 35% ± 15%."},{name:"Thematic Analysis",category:"analysis",definition:"A qualitative method for identifying, analyzing, and reporting patterns within data.",example:"Coding interview transcripts to identify recurring themes about barriers."},{name:"Cumulative vs Current",category:"analysis",definition:"Cumulative = total since program start; current = this reporting period only.",example:"'500,000 trained since 2018' (cumulative) vs '75,000 in 2024' (current)."},{name:"Unique Beneficiaries",category:"analysis",definition:"Distinct individuals served, deduplicated to avoid counting same person multiple times.",example:"320,000 unique farmers (not 500,000 service contacts which may double-count)."},{name:"Counterfactual",category:"evaluation",definition:"What would have happened to participants in the absence of the intervention.",example:"Estimating what farmers' yields would have been without the training program."},{name:"Attribution",category:"evaluation",definition:"The extent to which observed effects can be causally linked to a specific intervention.",example:"Determining whether improved learning was caused by the program or other factors."},{name:"Contribution",category:"evaluation",definition:"The extent to which an intervention contributed to observed changes, alongside other factors.",example:"The program contributed to reduced malnutrition, along with economic growth."},{name:"Randomized Controlled Trial",category:"evaluation",definition:"An experimental design randomly assigning units to treatment and control to establish causation.",example:"Randomly assigning 100 villages to program and 100 to comparison."},{name:"Internal Validity",category:"evaluation",definition:"The extent to which effects can be attributed to the intervention rather than confounders.",example:"Randomization ensures treatment and control groups are comparable."},{name:"External Validity",category:"evaluation",definition:"The extent to which findings can be generalized to other populations, settings, or times.",example:"Would a program that worked in Kenya also work in Bangladesh?"},{name:"Selection Bias",category:"evaluation",definition:"Systematic differences between groups that affect outcomes independently of the intervention.",example:"Villages that opted in may have been more motivated, confounding estimates."},{name:"Quasi-Experimental Design",category:"evaluation",definition:"Evaluation designs that approximate experimental conditions without random assignment.",example:"Regression discontinuity comparing students just above and below a cutoff."},{name:"OECD-DAC Criteria",category:"evaluation",definition:"Six criteria: Relevance, Coherence, Effectiveness, Efficiency, Impact, and Sustainability.",example:"Structuring an evaluation report around each of the six DAC criteria."},{name:"Contribution Analysis",category:"evaluation",definition:"A theory-based approach building a credible 'contribution story' verified against evidence.",example:"Developing and testing alternative explanations for observed nutrition changes."},{name:"Adaptive Management",category:"learning",definition:"A structured approach emphasizing learning and adjusting strategies based on evidence.",example:"Quarterly reviews where teams analyze data and adjust implementation."},{name:"CLA Framework",category:"learning",definition:"USAID's Collaborating, Learning, Adapting framework for organizational learning.",example:"Embedding pause-and-reflect sessions into project workplans."},{name:"Pause and Reflect",category:"learning",definition:"Scheduled sessions for teams to step back, review data, and discuss implications.",example:"Monthly meetings dedicated to reviewing monitoring data and adapting plans."},{name:"Knowledge Management",category:"learning",definition:"Systematic approaches to capturing, organizing, and sharing knowledge.",example:"Maintaining a lessons learned database accessible to all project staff."},{name:"Utilization-Focused Evaluation",category:"learning",definition:"An approach judging evaluation success by whether findings are actually used.",example:"Designing questions based on what decisions stakeholders need to make."},{name:"Feedback Loop",category:"learning",definition:"A mechanism for systematically collecting and responding to stakeholder input.",example:"Hotline where farmers report problems and receive responses within 48 hours."}];
let currentCategory='all';
function renderTerms(f){const g=document.getElementById('terms-grid');g.innerHTML=f.map(t=>`<div class="term-card" data-category="${t.category}"><div class="term-header"><span class="term-name">${t.name}</span><span class="term-category">${t.category}</span></div><p class="term-definition">${t.definition}</p><p class="term-example">${t.example}</p></div>`).join('');document.getElementById('stats').textContent=`Showing ${f.length} of ${terms.length} terms`;}
function filterTerms(){const s=document.getElementById('search').value.toLowerCase();let f=terms;if(currentCategory!=='all')f=f.filter(t=>t.category===currentCategory);if(s)f=f.filter(t=>t.name.toLowerCase().includes(s)||t.definition.toLowerCase().includes(s)||t.example.toLowerCase().includes(s));renderTerms(f);}
function filterByCategory(c){currentCategory=c;document.querySelectorAll('.category-tab').forEach(t=>t.classList.toggle('active',t.dataset.category===c));filterTerms();}
function toggleTheme(){const h=document.documentElement;h.setAttribute('data-theme',h.getAttribute('data-theme')==='light'?'dark':'light');}
renderTerms(terms);
    </script>
</body>
</html>
