<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ImpactMojo — Handouts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --primary-bg:#0F172A; --secondary-bg:#1E293B; --card-bg:#111827;
  --text-primary:#F1F5F9; --text-secondary:#94A3B8;
  --accent-color:#0EA5E9; --border-color:#334155; --ring:#1EAEEE;
}
/* Light mode override */
body.light-mode{
  --primary-bg:#FFFFFF; --secondary-bg:#F8FAFC; --card-bg:#FFFFFF;
  --text-primary:#0F172A; --text-secondary:#475569;
  --border-color:#E2E8F0; --ring:#0EA5E9;
}
/* Base */
*{box-sizing:border-box}
body{margin:0;background:var(--primary-bg);color:var(--text-primary);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
a{color:inherit}
.container{max-width:1200px;margin:0 auto;padding:0 1rem}
/* Header (simple, consistent with home) */
.header{position:sticky;top:0;background:rgba(15,23,42,.92);
  backdrop-filter:blur(14px);border-bottom:1px solid var(--border-color);z-index:40}
body.light-mode .header{background:rgba(255,255,255,.9)}
.nav{display:flex;justify-content:space-between;align-items:center;padding:.8rem 0}
.nav a{color:var(--text-primary);text-decoration:none;margin-right:1.25rem;font-weight:600}
.nav a:last-child{margin-right:0}
.theme-toggle{background:transparent;border:1px solid var(--border-color);border-radius:10px;
  color:var(--text-primary);padding:.4rem .65rem;cursor:pointer}
/* Hero */
.hero{padding:2rem 0 1rem}
.hero h1{font-family:Poppins,sans-serif;font-size:2rem;margin:0;
  background:linear-gradient(135deg,#0EA5E9,#6366F1);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text-secondary);margin:.35rem 0 0}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin:1rem 0}
.control{display:flex;align-items:center;gap:.5rem;background:var(--card-bg);
  border:1px solid var(--border-color);border-radius:10px;padding:.5rem .65rem}
.control input{background:transparent;border:none;outline:none;color:var(--text-primary);min-width:240px}
.chips{display:flex;gap:.35rem;flex-wrap:wrap}
.chip{border:1px solid var(--border-color);border-radius:999px;padding:.2rem .55rem;
  font-size:.78rem;color:var(--text-secondary);cursor:pointer;user-select:none}
.chip.active{border-color:var(--ring);color:var(--ring)}
/* Sections */
.section{padding:1rem 0 2rem}
.section-header{display:flex;align-items:baseline;gap:.6rem;margin:.5rem 0 1rem}
.kicker{text-transform:uppercase;letter-spacing:.14em;font-size:.75rem;color:var(--text-secondary)}
.h2{font-family:Poppins,sans-serif;font-size:1.5rem;margin:0}
/* Cards (polished) */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.card{background:var(--card-bg);border:1px solid var(--border-color);border-radius:14px;
  padding:1rem;transition:transform .15s,border-color .15s;overflow:hidden;min-height:220px}
.card:hover{transform:translateY(-2px);border-color:var(--ring);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.card-title{font-weight:800;margin:0 0 .25rem}
.card-desc{color:var(--text-secondary);font-size:.9rem;margin:0 0 .6rem}
.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:.35rem;max-width:100%}
.item a{text-decoration:none;display:flex;align-items:center;gap:.5rem;color:var(--text-primary);
  min-width:0} /* allow children to shrink properly */
.badge{border:1px solid var(--border-color);border-radius:999px;padding:.08rem .45rem;
  font-size:.7rem;color:var(--text-secondary);flex:0 0 auto}
.badge-pdf{border-color:#EF444433;color:#EF4444}
.badge-ppt{border-color:#F59E0B33;color:#F59E0B}
.badge-doc{border-color:#60A5FA33;color:#60A5FA}
.badge-md{border-color:#A78BFA33;color:#A78BFA}
.badge-code{border-color:#10B98133;color:#10B981}
.badge-ipynb{border-color:#F472B633;color:#F472B6}
.text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:100%}
.badge-csv{border-color:#22D3EE33;color:#22D3EE}
.badge-folder{border-color:#94A3B833;color:#94A3B8}
.actions{margin-top:.6rem}
.btn{display:inline-block;border:1px solid var(--border-color);border-radius:10px;padding:.4rem .65rem;
  text-decoration:none;color:var(--text-primary)}
.btn:hover{border-color:var(--ring);color:var(--ring)}
/* Footer */
.footer{border-top:1px solid var(--border-color);padding:1rem 0;color:var(--text-secondary);margin-top:2rem}
/* Utility */
.hidden{display:none !important}
</style>
</head>
<body>
<div class="header">
  <div class="container">
    <div class="nav">
      <div><a href="index.html">ImpactMojo</a></div>
      <div>
        <a href="index.html#tracks">Tracks</a>
        <a href="handouts.html">Handouts</a>
        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme"><span class="ico"></span></button>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <section class="hero">
    <h1>Handouts</h1>
    <p>Live listing from GitHub. Search, filter by type, and jump by track.</p>
    <div class="controls">
      <div class="control"><input id="search" placeholder="Search handouts by name…"/></div>
      <div class="chips" id="typeChips">
        <div class="chip" data-type="pdf">PDF</div>
        <div class="chip" data-type="ppt">Slides</div>
        <div class="chip" data-type="doc">Docs</div>
        <div class="chip" data-type="md">Markdown</div>
        <div class="chip" data-type="code">Code</div>
        <div class="chip" data-type="ipynb">Notebook</div>
        <div class="chip" data-type="csv">Data</div>
        <div class="chip" data-type="folder">Folders</div>
      </div>
    </div>
  </section>

  <!-- Data Analysis -->
  <section class="section" id="data-analysis">
    <div class="section-header"><div class="kicker">Track</div><h2 class="h2">Data Analysis</h2></div>
    <div class="grid" data-grid="data-analysis"></div>
  </section>

  <!-- Gender Studies -->
  <section class="section" id="gender-studies">
    <div class="section-header"><div class="kicker">Track</div><h2 class="h2">Gender Studies</h2></div>
    <div class="grid" data-grid="gender-studies"></div>
  </section>

  <!-- Policy & Economics -->
  <section class="section" id="policy-and-economics">
    <div class="section-header"><div class="kicker">Track</div><h2 class="h2">Policy &amp; Economics</h2></div>
    <div class="grid" data-grid="policy-and-economics"></div>
  </section>

  <!-- Research Methods -->
  <section class="section" id="research-methods">
    <div class="section-header"><div class="kicker">Track</div><h2 class="h2">Research Methods</h2></div>
    <div class="grid" data-grid="research-methods"></div>
  </section>

  <div class="footer">© ImpactMojo</div>
</div>

<script>
// ------- Config -------
const OWNER = "Varnasr";
const REPO  = "ImpactMojo";
const ROOT  = "Handouts"; // starting folder
// Track mapping heuristics by folder/file name
function mapTrack(name){
  const s = name.toLowerCase();
  if (/(gender|feminism|wee|care|intersectional|marginal)/.test(s)) return "gender-studies";
  if (/(policy|econ|economics|livelihood|inequality|social-safety|advocacy|finance|tax)/.test(s)) return "policy-and-economics";
  if (/(method|mel|evaluation|qual|quant|ethic|design|obs2insight|research)/.test(s)) return "research-methods";
  if (/(data|eda|stats|statistic|regression|econometric|analysis|python|r-?)/.test(s)) return "data-analysis";
  // fallback
  return "data-analysis";
}
function badgeFor(path, type){
  const ext = path.split(".").pop().toLowerCase();
  if (type === "dir") return "folder";
  if (/pdf$/.test(ext)) return "pdf";
  if (/(ppt|pptx|key)$/.test(ext)) return "ppt";
  if (/(doc|docx|odt)$/.test(ext)) return "doc";
  if (/(md|rst)$/.test(ext)) return "md";
  if (/(ipynb)$/.test(ext)) return "ipynb";
  if (/(csv|tsv|xlsx?)$/.test(ext)) return "csv";
  if (/(py|r|js|ts|html|css)$/.test(ext)) return "code";
  return "doc";
}
// ------- Fetch helpers -------
async function ghList(path){
  const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${encodeURIComponent(path)}?ref=main`;
  const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github+json' }});
  if (!res.ok) throw new Error('GitHub fetch failed: '+res.status);
  return res.json();
}

async function collectEntries(root){
  // One level down: list root, then for each directory, list its children
  const out = [];
  const rootItems = await ghList(root);
  for (const item of rootItems){
    out.push(item);
    if (item.type === "dir"){
      try{
        const children = await ghList(item.path);
        for (const ch of children){ out.push(ch); }
      }catch(err){ console.warn('Child list failed for', item.path, err); }
    }
  }
  return out;
}
// ------- Render -------
function makeCard(folder, files){
  const card = document.createElement('div');
  card.className = 'card';
  const title = folder.name.replace(/[-_]+/g,' ').replace(/\s+/g,' ').trim();
  const desc = folder.path;
  const list = files.map(f => {
    const b = badgeFor(f.name, f.type);
    const badgeCls = `badge badge-${b}`;
    const name = f.name;
    return `<li class="item"><a href="${f.html_url}" title="${name}"><span class="${badgeCls}">${b.toUpperCase()}</span><span class="text">${name}</span></a></li>`;
  }).join('');
  card.innerHTML = `
    <h3 class="card-title">${title}</h3>
    <p class="card-desc">${desc}</p>
    <ul class="list">${list || '<li class="item">No files yet.</li>'}</ul>
    <div class="actions"><a class="btn" href="${folder.html_url}">Open folder</a></div>
  `;
  return card;
}
function applyFilter(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const active = Array.from(document.querySelectorAll('.chip.active')).map(c=>c.dataset.type);
  document.querySelectorAll('.grid .card').forEach(card=>{
    const text = card.textContent.toLowerCase();
    let show = true;
    if (q && !text.includes(q)) show = false;
    if (active.length){
      // require at least one matching type badge within the card
      const has = active.some(t => card.querySelector(`.badge-${t}`));
      if (!has) show = false;
    }
    card.classList.toggle('hidden', !show);
  });
}
// ------- Boot -------
(async function init(){
  try{
    const all = await collectEntries(ROOT);
    // group by top-level folder; include loose files under "Handouts" in Data Analysis by default
    const folders = all.filter(x=>x.type==='dir' && x.path.split('/').length===2); // Handouts/<folder>
    const loose   = all.filter(x=>x.type!=='dir' && x.path.split('/').length===2);
    // Render each folder as a card in its mapped track
    for (const folder of folders){
      const track = mapTrack(folder.name);
      const children = all.filter(x => x.path.startsWith(folder.path + '/'));
      const grid = document.querySelector(`.grid[data-grid="${track}"]`);
      if (!grid) continue;
      grid.appendChild(makeCard(folder, children.filter(x=>x.type!=='dir')));
    }
    // Render loose files if any
    if (loose.length){
      const grid = document.querySelector(`.grid[data-grid="data-analysis"]`);
      const fake = {name:'General', path:ROOT, html_url:`https://github.com/${OWNER}/${REPO}/tree/main/${ROOT}`};
      grid.appendChild(makeCard(fake, loose));
    }
  }catch(err){
    console.error(err);
    // Friendly error card
    document.querySelectorAll('.grid').forEach(g=>{
      const c = document.createElement('div');
      c.className = 'card';
      c.innerHTML = '<h3 class="card-title">Could not load GitHub contents</h3><p class="card-desc">Please refresh or try later.</p>';
      g.appendChild(c);
    });
  }
  // Wire filters
  document.getElementById('search').addEventListener('input', applyFilter);
  document.getElementById('typeChips').addEventListener('click', e=>{
    const chip = e.target.closest('.chip'); if (!chip) return;
    chip.classList.toggle('active'); applyFilter();
  });
  // Honor URL hash from homepage buttons
  if (location.hash){
    const el = document.querySelector(location.hash);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  }
})();
</script>

<script>
(function(){
  const btn = document.getElementById('themeToggle');
  if(!btn) return;
  const sun = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="4" stroke="currentColor" fill="none" stroke-width="1.6"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" stroke="currentColor" fill="none" stroke-width="1.6"/></svg>';
  const moon = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" fill="none" stroke-width="1.6"/></svg>';
  function setIcon(){
    const light = document.body.classList.contains('light-mode');
    btn.querySelector('.ico').innerHTML = light ? moon : sun;
  }
  btn.addEventListener('click', function(){
    document.body.classList.toggle('light-mode');
    setIcon();
  });
  setIcon();
})();
</script>

</body>
</html>
